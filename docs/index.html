<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Fırsat Niş Bulucu</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --accent: #f5c542;
    --accent2: #4ade80;
    --text: #e8e8ec;
    --muted: #8b8f99;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  header { max-width: 900px; margin: 0 auto 24px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .meta { color: var(--muted); font-size: 13px; }
  .grid {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    gap: 14px;
  }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    border: 1px solid #2a2e38;
  }
  .card.ideal { border-color: var(--accent2); }
  .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .channel { font-weight: 600; font-size: 15px; }
  .badge {
    font-size: 11px;
    background: var(--accent2);
    color: #0f1115;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
    white-space: nowrap;
  }
  .title { color: var(--text); font-size: 14px; margin: 8px 0; line-height: 1.4; }
  .stats { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
  .score {
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .empty { color: var(--muted); text-align: center; padding: 40px 0; }
</style>
</head>
<body>
  <header>
    <h1>📈 YouTube Fırsat Niş Bulucu</h1>
    <div class="meta" id="meta">Yükleniyor...</div>
  </header>
  <div class="grid" id="results"></div>

  <script>
    fetch('data.json?_=' + Date.now())
      .then(res => res.json())
      .then(data => {
        const meta = document.getElementById('meta');
        const results = document.getElementById('results');
        const date = new Date(data.generated_at);
        meta.textContent = 'Son güncelleme: ' + date.toLocaleString('tr-TR') +
          ' · Kriter: max ' + data.criteria.max_subscribers.toLocaleString('tr-TR') +
          ' abone, min ' + data.criteria.min_view_to_sub_ratio + 'x oran, ' +
          'kanalda max ' + data.criteria.max_channel_video_count + ' video';

        if (!data.opportunities.length) {
          results.innerHTML = '<div class="empty">Bugün kriterlere uyan fırsat niş bulunamadı.</div>';
          return;
        }

        results.innerHTML = data.opportunities.map(op => `
          <div class="card ${op.ideal ? 'ideal' : ''}">
            <div class="row">
              <div class="channel">${op.channel}</div>
              ${op.ideal ? '<span class="badge">🌟 İDEAL</span>' : ''}
            </div>
            <div class="title">🎬 ${op.title}</div>
            <div class="stats">
              <span>👥 ${op.subscribers.toLocaleString('tr-TR')} abone</span>
              <span>👁 ${op.views.toLocaleString('tr-TR')} izlenme</span>
              <span>🎞 ${op.channel_video_count} video</span>
              <span>📅 ${op.published}</span>
              <span class="score">⚡ ${op.score}x</span>
            </div>
            <div style="margin-top:8px;"><a href="${op.url}" target="_blank">Videoyu aç →</a></div>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('meta').textContent = 'Henüz veri yok — ilk tarama tamamlanınca burada görünecek.';
      });
  </script>
</body>
</html>
