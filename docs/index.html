<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Fırsat Niş Bulucu</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --accent: #f5c542;
    --accent2: #4ade80;
    --accent3: #f97373;
    --text: #e8e8ec;
    --muted: #8b8f99;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  header { max-width: 900px; margin: 0 auto 24px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .meta { color: var(--muted); font-size: 13px; }
  .grid { max-width: 900px; margin: 0 auto; display: grid; gap: 14px; }
  .card { background: var(--card); border-radius: 12px; padding: 16px; border: 1px solid #2a2e38; }
  .card.strong { border-color: var(--accent3); }
  .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .channel { font-weight: 700; font-size: 16px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; color: #0f1115; padding: 2px 8px; border-radius: 999px;
    font-weight: 600; white-space: nowrap;
  }
  .badge.ideal { background: var(--accent2); }
  .badge.strong { background: var(--accent3); }
  .chan-stats { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin: 6px 0 12px; }
  .video-list { display: flex; flex-direction: column; gap: 8px; }
  .video-item { background: #11141a; border-radius: 8px; padding: 10px 12px; border: 1px solid #232734; }
  .video-title { font-size: 13.5px; margin-bottom: 4px; line-height: 1.35; }
  .video-stats { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11.5px; color: var(--muted); }
  .ratio { color: var(--accent); font-weight: 700; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .empty { color: var(--muted); text-align: center; padding: 40px 0; }
</style>
</head>
<body>
  <header>
    <h1>📈 YouTube Fırsat Niş Bulucu</h1>
    <div class="meta" id="meta">Yükleniyor...</div>
  </header>
  <div class="grid" id="results"></div>

  <script>
    fetch('data.json?_=' + Date.now())
      .then(res => res.json())
      .then(data => {
        const meta = document.getElementById('meta');
        const results = document.getElementById('results');

        if (!data.generated_at) {
          meta.textContent = 'Henüz ilk tarama tamamlanmadı.';
        } else {
          const date = new Date(data.generated_at);
          const c = data.criteria;
          meta.textContent = 'Son güncelleme: ' + date.toLocaleString('tr-TR') +
            ' · Kriter: ' + c.min_subscribers.toLocaleString('tr-TR') + '-' +
            c.max_subscribers.toLocaleString('tr-TR') + ' abone, max ' +
            c.max_channel_video_count + ' video, ' + c.min_video_minutes + '-' +
            c.max_video_minutes + ' dk, en az 1 video abonenin ' +
            c.min_view_to_sub_ratio + 'x izlenmiş';
        }

        if (!data.opportunities || !data.opportunities.length) {
          results.innerHTML = '<div class="empty">Bugün kriterlere uyan fırsat niş bulunamadı.</div>';
          return;
        }

        results.innerHTML = data.opportunities.map(op => {
          const isIdeal = op.subscribers <= 5000;
          const isStrong = op.high_ratio_count >= 2;
          return `
          <div class="card ${isStrong ? 'strong' : ''}">
            <div class="row">
              <div class="channel">${op.channel}</div>
              <div class="badges">
                ${isIdeal ? '<span class="badge ideal">🌟 İDEAL</span>' : ''}
                ${isStrong ? '<span class="badge strong">🔥 GÜÇLÜ</span>' : ''}
              </div>
            </div>
            <div class="chan-stats">
              <span>👥 ${op.subscribers.toLocaleString('tr-TR')} abone</span>
              <span>🎞 ${op.channel_video_count} video</span>
              <span>🕓 Kanal ${op.channel_age_days}g / İlk video ${op.first_video_age_days}g önce</span>
              <span>⚡ En iyi oran: ${op.best_ratio}x</span>
              <span>💯 ${op.high_ratio_count} video oranı geçti</span>
            </div>
            <div class="video-list">
              ${op.top_videos.map(v => `
                <div class="video-item">
                  <div class="video-title">🎬 ${v.title}</div>
                  <div class="video-stats">
                    <span>👁 ${v.views.toLocaleString('tr-TR')} izlenme</span>
                    <span class="ratio">⚡ ${v.ratio}x</span>
                    <span>📅 ${v.published}</span>
                    <span><a href="${v.url}" target="_blank">Videoyu aç →</a></span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        }).join('');
      })
      .catch(() => {
        document.getElementById('meta').textContent = 'Henüz veri yok — ilk tarama tamamlanınca burada görünecek.';
      });
  </script>
</body>
</html>
